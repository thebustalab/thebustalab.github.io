<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Decision Flow for Natural Scientists</title>
  <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f5f8;
      --card: #ffffff;
      --ink: #222222;
      --muted: #666666;
      --accent: #8a4680;
      --accent-light: #a95e9e;
      --accent-faint: #f3eaf1;
      --green: #2e7d5b;
      --green-bg: #e8f5ec;
      --amber: #b8860b;
      --amber-bg: #fdf5e0;
      --red: #b33a3a;
      --red-bg: #fbeaea;
      --line: #ddd4db;
      --max-width: 960px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Poppins", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.55;
    }

    .wrap {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.3rem, 2.6vw, 1.9rem);
      font-weight: 600;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 0 0 24px;
      font-weight: 300;
    }

    /* Example selector */
    .example-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
      margin-bottom: 28px;
    }

    .example-card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .example-card:hover {
      border-color: var(--accent-light);
      box-shadow: 0 2px 12px rgba(138, 70, 128, 0.12);
    }

    .example-card.active {
      border-color: var(--accent);
      background: var(--accent-faint);
      box-shadow: 0 2px 16px rgba(138, 70, 128, 0.18);
    }

    .example-card .card-num {
      font-weight: 600;
      color: var(--accent);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .example-card .card-title {
      font-weight: 500;
      margin-top: 2px;
    }

    .example-card .card-role {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 2px;
    }

    /* Flow area */
    .flow-area {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(60, 30, 55, 0.07);
      overflow: hidden;
    }

    .flow-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .flow-title {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .flow-controls {
      display: flex;
      gap: 8px;
    }

    .flow-btn {
      font-family: "Poppins", sans-serif;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      padding: 7px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .flow-btn:hover {
      background: var(--accent-light);
    }

    .flow-btn.outline {
      background: transparent;
      color: var(--accent);
    }

    .flow-btn.outline:hover {
      background: var(--accent-faint);
    }

    .flow-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* Node display */
    .flow-body {
      padding: 22px;
      min-height: 220px;
    }

    .node-progress {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }

    .node-pip {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--line);
      transition: background 0.3s;
    }

    .node-pip.done {
      background: var(--accent);
    }

    .node-pip.current {
      background: var(--accent-light);
    }

    .node-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .node-heading {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .node-text {
      font-size: 0.9rem;
      color: #333;
      line-height: 1.6;
    }

    .node-text p {
      margin: 0 0 10px;
    }

    .node-text p:last-child {
      margin-bottom: 0;
    }

    /* Outcome chips */
    .outcome {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      margin: 8px 0 4px;
    }

    .outcome.green {
      background: var(--green-bg);
      color: var(--green);
    }

    .outcome.amber {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .outcome.red {
      background: var(--red-bg);
      color: var(--red);
    }

    /* Subtask list */
    .subtask-list {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }

    .subtask-list li {
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 8px;
      font-size: 0.87rem;
      border-left: 4px solid var(--line);
      background: #fafafa;
    }

    .subtask-list li.good {
      border-left-color: var(--green);
      background: var(--green-bg);
    }

    .subtask-list li.caution {
      border-left-color: var(--amber);
      background: var(--amber-bg);
    }

    .subtask-list li.poor {
      border-left-color: var(--red);
      background: var(--red-bg);
    }

    .subtask-label {
      font-weight: 500;
    }

    /* Verdict */
    .verdict-box {
      margin-top: 14px;
      padding: 14px 18px;
      border-radius: 10px;
      border: 2px solid var(--line);
    }

    .verdict-box.positive {
      border-color: var(--green);
      background: var(--green-bg);
    }

    .verdict-box.mixed {
      border-color: var(--amber);
      background: var(--amber-bg);
    }

    .verdict-box.negative {
      border-color: var(--red);
      background: var(--red-bg);
    }

    .verdict-label {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .verdict-text {
      font-size: 0.88rem;
      line-height: 1.55;
    }

    /* Placeholder */
    .placeholder {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .example-grid {
        grid-template-columns: 1fr;
      }
      .flow-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

      <div class="flow-body" id="flowBody">
        <div class="placeholder">Choose a task from the grid above to see how it flows through the five-node decision framework.</div>
      </div>
    </div>
  </div>

const NODE_NAMES = [
  "Data Confidentiality",
  "Mode",
  "Decomposition",
  "Axes",
  "Responsibility"
];

let currentExample = null;
let currentNode = 0;

const grid = document.getElementById("exampleGrid");
const flowTitle = document.getElementById("flowTitle");
const flowBody = document.getElementById("flowBody");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

function buildGrid() {
  for (const ex of EXAMPLES) {
    const card = document.createElement("div");
    card.className = "example-card";
    card.dataset.id = ex.id;
    card.innerHTML = `<div class="card-num">Example ${ex.id}</div><div class="card-title">${esc(ex.title)}</div><div class="card-role">${esc(ex.role)}</div>`;
    card.addEventListener("click", () => selectExample(ex.id));
    grid.appendChild(card);
  }
}

function selectExample(id) {
  currentExample = EXAMPLES.find(e => e.id === id);
  currentNode = 0;
  document.querySelectorAll(".example-card").forEach(c => {
    c.classList.toggle("active", Number(c.dataset.id) === id);
  });
  renderNode();
}

function renderNode() {
  if (!currentExample) return;
  const nodes = currentExample.nodes;
  const n = nodes[currentNode];

  prevBtn.disabled = currentNode === 0;
  nextBtn.disabled = false;
  nextBtn.textContent = currentNode === nodes.length - 1 ? "Done" : "Next";
  flowTitle.textContent = currentExample.title;

  let html = "";

  // progress pips
  html += '<div class="node-progress">';
  for (let i = 0; i < nodes.length; i++) {
    const cls = i < currentNode ? "done" : i === currentNode ? "current" : "";
    html += `<div class="node-pip ${cls}"></div>`;
  }
  html += "</div>";

  html += `<div class="node-label">${esc(n.label)} of 5</div>`;
  html += `<div class="node-heading">${esc(n.heading)}</div>`;
  html += `<span class="outcome ${n.outcome}">${esc(n.outcomeText)}</span>`;
  html += `<div class="node-text">${n.body}</div>`; // body contains trusted HTML

  if (n.subtasks) {
    html += '<ul class="subtask-list">';
    for (const st of n.subtasks) {
      html += `<li class="${st.rating}"><span class="subtask-label">${esc(st.text)}</span></li>`;
    }
    html += "</ul>";
  }

  if (n.verdict) {
    html += `<div class="verdict-box ${n.verdict.type}"><div class="verdict-label">Verdict</div><div class="verdict-text">${esc(n.verdict.text)}</div></div>`;
  }

  flowBody.innerHTML = html;
}

function esc(s) {
  const el = document.createElement("span");
  el.textContent = s;
  return el.innerHTML;
}

prevBtn.addEventListener("click", () => {
  if (currentNode > 0) {
    currentNode--;
    renderNode();
  }
});

nextBtn.addEventListener("click", () => {
  if (!currentExample) return;
  if (currentNode < currentExample.nodes.length - 1) {
    currentNode++;
    renderNode();
  } else {
    // "Done" — reset to card selection
    currentExample = null;
    currentNode = 0;
    flowTitle.textContent = "Select an example above";
    flowBody.innerHTML = '<div class="placeholder">Choose another task from the grid to compare how different tasks flow through the framework.</div>';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    document.querySelectorAll(".example-card").forEach(c => c.classList.remove("active"));
  }
});

buildGrid();
</script>
