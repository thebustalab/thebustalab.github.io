<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Abstract labelling</title>
<style>
  :root {
    --bg: #fafafa;
    --fg: #222;
    --muted: #777;
    --border: #ddd;
    --accent: #2b5d8a;
    --accent-hover: #1e4566;
    --warn: #b85c00;
    --ok: #2e7d32;
    --row-bg: #fff;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    padding: 2rem 1rem;
    line-height: 1.5;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 0.5rem 0;
  }
  .progress {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }
  .abstract-block {
    background: var(--row-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .abstract-block h2 {
    font-size: 1.1rem;
    margin: 0 0 0.5rem 0;
    color: var(--fg);
  }
  .abstract-meta {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }
  .abstract-text {
    font-size: 0.98rem;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .triples {
    margin-top: 0.5rem;
  }
  .triple-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1.1fr 2rem;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    align-items: center;
  }
  .triple-row input, .triple-row select {
    font: inherit;
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    width: 100%;
  }
  .triple-row .remove {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0;
  }
  .triple-row .remove:hover {
    color: var(--warn);
  }
  .triple-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1.1fr 2rem;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  button.add-row, button.no-rel, button.submit {
    font: inherit;
    padding: 0.5rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    margin-right: 0.5rem;
  }
  button.add-row:hover { background: #eee; }
  button.no-rel.active {
    background: var(--warn);
    color: #fff;
    border-color: var(--warn);
  }
  button.submit {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  button.submit:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button.submit:disabled, button.no-rel:disabled, button.add-row:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .form-actions {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .form-actions .spacer { flex: 1; }
  .notes-block {
    margin-top: 1rem;
  }
  .notes-block label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .notes-block textarea {
    font: inherit;
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    width: 100%;
    box-sizing: border-box;
    resize: vertical;
  }
  .name-prompt {
    margin-bottom: 1.5rem;
    padding: 1rem 1.25rem;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .name-prompt label {
    display: block;
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .name-prompt input {
    font: inherit;
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 18rem;
    margin-right: 0.5rem;
  }
  .status {
    margin-top: 1rem;
    color: var(--muted);
    font-size: 0.9rem;
    min-height: 1.2em;
  }
  .status.error { color: var(--warn); }
  .status.ok { color: var(--ok); }
  .hidden { display: none !important; }
  .all-done {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ok);
    font-size: 1.2rem;
  }
  .leaderboard {
    margin-top: 2rem;
    padding: 1rem 1.25rem;
    background: var(--row-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .leaderboard h3 {
    font-size: 0.95rem;
    margin: 0 0 0.2rem 0;
    color: var(--fg);
  }
  .leaderboard-sub {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }
  #leaderboard-table {
    width: auto;
    font-size: 0.9rem;
    border-collapse: collapse;
  }
  #leaderboard-table td {
    padding: 0.15rem 0.8rem 0.15rem 0;
  }
  #leaderboard-table td.count {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
  }
  #leaderboard-table tr.me td { font-weight: 600; color: var(--accent); }

  /* ── Task-type additions ──────────────────────────────────────────── */
  .task-badge {
    display: inline-block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #fff;
    background: var(--accent);
    border-radius: 4px;
    padding: 0.1rem 0.45rem;
    margin-bottom: 0.6rem;
  }
  .task-badge.enzyme { background: #6a4a8a; }
  .abstract-link { font-size: 0.85rem; margin-top: 0.6rem; }
  .abstract-link a { color: var(--accent); }
  .enzyme-row {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.85rem 1rem 0.9rem;
    margin-bottom: 0.75rem;
    background: #fff;
    position: relative;
  }
  .enzyme-row .field { margin-bottom: 0.6rem; }
  .enzyme-row .field:last-child { margin-bottom: 0; }
  .enzyme-row label.field-label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .enzyme-row input, .enzyme-row textarea, #enzyme-doi {
    font: inherit;
    padding: 0.5rem 0.6rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: #fff;
    width: 100%;
  }
  .enzyme-row textarea.seq {
    resize: vertical;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.85rem;
    white-space: pre;
    word-break: break-all;
  }
  .enzyme-row .remove-enzyme {
    position: absolute;
    top: 0.5rem;
    right: 0.6rem;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
  }
  .enzyme-row .remove-enzyme:hover { color: var(--warn); }
</style>
</head>
<body>
<main>

  <h1>Abstract labelling</h1>
  <div class="progress" id="progress">Loading…</div>

  <!-- Name prompt: shown only on first visit. Dropdown sourced from CONFIG.ROSTER below. -->
  <div class="name-prompt hidden" id="name-prompt">
    <label for="name-select">Your name (used to track which labels you submitted):</label>
    <select id="name-select"></select>
    <button class="submit" id="name-save">Save</button>
  </div>

  <!-- Main labelling card -->
  <div id="labelling-card" class="hidden">
    <div class="abstract-block">
      <div class="task-badge" id="task-badge"></div>
      <h2 id="abstract-title"></h2>
      <div class="abstract-meta" id="abstract-meta"></div>
      <div class="abstract-text" id="abstract-text"></div>
      <div class="abstract-link" id="abstract-link"></div>
    </div>

    <!-- ── Pathogen form: (compound, pathogen, effect) triples ──────────── -->
    <div id="pathogen-form" class="hidden">
      <div class="triple-header">
        <div>Compound</div>
        <div>Pathogen</div>
        <div>Effect</div>
        <div></div>
      </div>
      <div class="triples" id="triples"></div>

      <div class="form-actions">
        <button class="add-row" id="add-row">+ Add another pair</button>
        <button class="no-rel" id="no-rel">No relationships found</button>
      </div>
    </div>

    <!-- ── Enzyme form: (sequence ↔ product) records the human retrieves ── -->
    <div id="enzyme-form" class="hidden">
      <div class="field" style="margin-bottom:0.75rem;">
        <label class="field-label" for="enzyme-doi">DOI / link the record came from</label>
        <input type="text" id="enzyme-doi" autocomplete="off" placeholder="doi:…">
      </div>
      <div id="enzymes"></div>

      <div class="form-actions">
        <button class="add-row" id="add-enzyme">+ Add another enzyme</button>
        <button class="no-rel" id="not-char">Not a functional characterisation</button>
      </div>
    </div>

    <!-- shared notes + submit -->
    <div class="notes-block">
      <label for="notes">Notes (optional) — anything confusing about this record</label>
      <textarea id="notes" rows="2" placeholder="optional notes for this abstract…"></textarea>
    </div>

    <div class="form-actions">
      <div class="spacer"></div>
      <button class="submit" id="submit">Submit &amp; next →</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <!-- Product typeahead suggestions, populated from the enzyme sheet -->
  <datalist id="product-suggestions"></datalist>

  <!-- All-done screen -->
  <div id="all-done" class="all-done hidden">
    ✓ All abstracts have two labellers. Thanks for your help!
  </div>

  <!-- Leaderboard: one point per labelling triple OR newsletter submission. -->
  <div id="leaderboard" class="leaderboard hidden">
    <h3>Leaderboard</h3>
    <div class="leaderboard-sub">One point per labelling triple or newsletter submission (photo / data update / abstract / reminder).</div>
    <table id="leaderboard-table"><tbody></tbody></table>
  </div>

</main>

<script>
/*
 * Abstract labelling — single-page client for lab-internal NLP gold-standard labels.
 *
 * Storage backend is a Google Apps Script web app (URL set below in CONFIG).
 * Submissions POST as JSON-encoded text/plain to work around Apps Script's
 * cross-origin POST limitations.
 *
 * Access control: a soft "knock" parameter ?k=<token> is read from the URL on
 * page load and forwarded with every request. The Apps Script rejects calls
 * that don't carry the expected token.
 *
 * Labeller identity: the labeller enters their name on first visit; it is
 * saved to localStorage and reused. Names are also used to compute
 * inter-rater agreement after the run.
 */

// ───────────────────────────────────────────────────────────────────────────
// CONFIG — fill in after deploying the Apps Script web app
// ───────────────────────────────────────────────────────────────────────────
const CONFIG = {
  // Replace with your deployed Apps Script web app URL
  // (Deploy → Web app → Anyone, then copy the /exec URL)
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyQQfJfR7YD9jCoPyL7OEmGLIJP0-tuNPwHP6CsaLGuBfDkLd9KWB7UDh50LskOUYg5AQ/exec",

  // Fallback distinct-labellers threshold, used only if a task type below
  // omits `labellersRequired`. Per-type values in TASK_TYPES take precedence.
  LABELLERS_PER_ABSTRACT: 2,

  // Task-type registry. Every pool item carries a `task_type`; this maps it to
  // its display label and how many distinct labellers "complete" it. Phase-1
  // seed of the config-driven registry — the per-type FORM and destination
  // SHEET are still branched in code here and in the Apps Script backend; a
  // later phase folds those into this same registry.
  TASK_TYPES: {
    pathogen: { label: "Compound–pathogen", labellersRequired: 2 },
    enzyme:   { label: "Characterised enzyme", labellersRequired: 1 },
  },
  DEFAULT_TASK_TYPE: "pathogen",  // items with no task_type are pathogen items

  // Extra pool files fetched alongside abstracts.json and concatenated. Each
  // item should carry its own task_type. (Phase 1: enzyme items are a static
  // sample; a later phase serves the pool from the backend so the cron can
  // append discovered items live.)
  EXTRA_POOL_FILES: ["enzyme_items.json"],

  // Lab roster — labellers must pick a name from this list. Update each
  // semester to reflect who's currently in the lab. Keep in sync with
  // newsletter/links.json (the same names appear in the newsletter form).
  ROSTER: [
    "Mady Larson", "Jenny Ruliffson", "Rory Westerman", "Becky Goetsch",
    "Makenna Karshbaum", "Mariona Checa", "Ellie Horsnell", "Bri Beebe",
    "Sam Saenger", "Skylar Vargas", "Brandon Bayard", "Lucas Busta",
    "Jenna Fette",
  ],

  // Direction dropdown options (order matters for display)
  DIRECTIONS: [
    { value: "", label: "— select —" },
    { value: "inhibits", label: "inhibits / antagonises" },
    { value: "induces", label: "induces / promotes" },
    { value: "no_effect_observed", label: "no effect observed" },
  ],
};
// ───────────────────────────────────────────────────────────────────────────

const $ = (id) => document.getElementById(id);
const state = {
  k: null,                    // access token from URL
  labeller: null,             // labeller name (from localStorage)
  abstracts: [],              // full pool of items across all task types
  serverState: {},            // map: item_id -> array of distinct labeller names
  current: null,              // currently displayed item record
  startTimeMs: null,          // when this item was first shown
  noRelMode: false,           // pathogen: "no relationships found" toggle
  notCharMode: false,         // enzyme: "not a functional characterisation" toggle
  products: [],               // distinct product names for the enzyme typeahead
};

// Task-type helpers ─────────────────────────────────────────────────────────
function itemType(item) {
  return (item && item.task_type) || CONFIG.DEFAULT_TASK_TYPE;
}
function typeConf(item) {
  const t = CONFIG.TASK_TYPES[itemType(item)] || {};
  return {
    label: t.label || itemType(item),
    labellersRequired: t.labellersRequired || CONFIG.LABELLERS_PER_ABSTRACT,
  };
}

// ─── Bootstrap ─────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", async () => {
  state.k = new URLSearchParams(window.location.search).get("k") || "";
  state.labeller = localStorage.getItem("labeller") || null;
  // If a stored name isn't in the current roster (e.g. roster updated mid-
  // semester), force the picker to reappear so the labeller updates it.
  if (state.labeller && !CONFIG.ROSTER.includes(state.labeller)) {
    state.labeller = null;
    localStorage.removeItem("labeller");
  }

  populateNameDropdown();

  if (!state.labeller) {
    $("name-prompt").classList.remove("hidden");
    $("name-select").focus();
    $("name-save").addEventListener("click", saveName);
    $("name-select").addEventListener("keydown", (e) => { if (e.key === "Enter") saveName(); });
  }

  try {
    state.abstracts = await fetchAbstracts();
  } catch (err) {
    setStatus("Failed to load abstracts: " + err.message, "error");
    return;
  }

  await refreshServerState();
  fetchProducts();          // best-effort; populates the enzyme typeahead
  bindControls();
  if (state.labeller) {
    showNextAbstract();
  }
  refreshLeaderboard();
});

function populateNameDropdown() {
  const select = $("name-select");
  if (!select) return;
  select.innerHTML = '<option value="">— select your name —</option>' +
    CONFIG.ROSTER.map(n => `<option value="${n}">${n}</option>`).join("");
}

async function fetchAbstracts() {
  // Load the base pathogen pool plus any extra per-type pool files, tag each
  // item with a task_type (defaulting to pathogen for the untyped base file),
  // and concatenate into one mixed pool.
  const files = ["abstracts.json", ...(CONFIG.EXTRA_POOL_FILES || [])];
  const lists = await Promise.all(files.map(async (f) => {
    try {
      const r = await fetch(f, { cache: "no-store" });
      if (!r.ok) throw new Error(f + " HTTP " + r.status);
      const items = await r.json();
      return Array.isArray(items) ? items : [];
    } catch (err) {
      // A missing optional pool file (e.g. enzyme_items.json not yet built) is
      // not fatal — the base abstracts.json still loads.
      if (f === "abstracts.json") throw err;
      console.warn("Optional pool file skipped:", f, err.message);
      return [];
    }
  }));
  const pool = [];
  for (const items of lists) {
    for (const it of items) {
      if (!it.task_type) it.task_type = CONFIG.DEFAULT_TASK_TYPE;
      pool.push(it);
    }
  }
  return pool;
}

async function fetchProducts() {
  // Distinct product names already in the enzyme sheet — drives the product
  // typeahead so spellings converge. Silent no-op in dev mode.
  if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.startsWith("REPLACE_")) return;
  try {
    const url = `${CONFIG.APPS_SCRIPT_URL}?action=products&k=${encodeURIComponent(state.k)}`;
    const r = await fetch(url);
    if (!r.ok) return;
    const list = await r.json();
    if (Array.isArray(list)) {
      state.products = list.filter((s) => typeof s === "string" && s.trim());
      const dl = $("product-suggestions");
      if (dl) dl.innerHTML = state.products.map((p) => `<option value="${p.replace(/"/g, "&quot;")}">`).join("");
    }
  } catch { /* typeahead is best-effort */ }
}

async function refreshServerState() {
  // Fetch labels-per-abstract summary from Apps Script.
  // Gracefully degrade to "no one has labelled anything" if the request fails
  // (useful while testing locally before the script is deployed).
  if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.startsWith("REPLACE_")) {
    state.serverState = {};
    setStatus("[dev mode] APPS_SCRIPT_URL not configured; submissions will print to console only.", "error");
    return;
  }
  try {
    const url = `${CONFIG.APPS_SCRIPT_URL}?action=state&k=${encodeURIComponent(state.k)}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error("state HTTP " + r.status);
    state.serverState = await r.json();
  } catch (err) {
    setStatus("Could not load state: " + err.message + ". Showing anyway.", "error");
    state.serverState = {};
  }
}

// ─── Name flow ─────────────────────────────────────────────────────────────
function saveName() {
  const v = $("name-select").value.trim();
  if (!v) return;
  state.labeller = v;
  localStorage.setItem("labeller", v);
  $("name-prompt").classList.add("hidden");
  showNextAbstract();
  refreshLeaderboard();
}

// ─── Item selection ────────────────────────────────────────────────────────
function eligiblePool() {
  return state.abstracts.filter((a) => {
    const labellers = state.serverState[a.id] || [];
    return labellers.length < typeConf(a).labellersRequired && !labellers.includes(state.labeller);
  });
}

function showNextAbstract() {
  const pool = eligiblePool();
  if (pool.length === 0) {
    $("labelling-card").classList.add("hidden");
    $("all-done").classList.remove("hidden");
    $("progress").textContent = "All items complete.";
    return;
  }
  state.current = pool[Math.floor(Math.random() * pool.length)];
  state.startTimeMs = Date.now();
  state.noRelMode = false;
  state.notCharMode = false;
  renderCurrent();
}

function renderCurrent() {
  const a = state.current;
  const type = itemType(a);
  const conf = typeConf(a);

  // Shared header
  const badge = $("task-badge");
  badge.textContent = conf.label;
  badge.className = "task-badge" + (type === "enzyme" ? " enzyme" : "");
  $("abstract-title").textContent = a.title || "(no title)";
  const meta = [a.authors, a.journal, a.year].filter(Boolean).join(" · ");
  $("abstract-meta").textContent = meta + (a.doi ? "  ·  doi:" + a.doi : "");
  $("abstract-text").textContent = a.abstract || "(no abstract)";
  renderLink(a);

  // Reset shared fields, then render the type-specific form
  $("notes").value = "";
  $("status").textContent = "";
  $("pathogen-form").classList.toggle("hidden", type !== "pathogen");
  $("enzyme-form").classList.toggle("hidden", type !== "enzyme");
  if (type === "enzyme") renderEnzymeForm(a);
  else renderPathogenForm(a);

  // Progress — each item counts as complete by its own per-type threshold
  const total = state.abstracts.length;
  const done = state.abstracts.filter((it) =>
    (state.serverState[it.id] || []).length >= typeConf(it).labellersRequired
  ).length;
  $("progress").textContent =
    `${done}/${total} items complete. This one: ${conf.label} ` +
    `(needs ${conf.labellersRequired} labeller${conf.labellersRequired === 1 ? "" : "s"}). ` +
    `Your name: ${state.labeller}.`;

  $("labelling-card").classList.remove("hidden");
}

function renderLink(a) {
  const el = $("abstract-link");
  const url = a.link || a.url ||
    (a.doi ? "https://doi.org/" + String(a.doi).replace(/^doi:/i, "") : "");
  if (url) {
    el.innerHTML = `<a href="${url}" target="_blank" rel="noopener">Open article ↗</a>`;
  } else {
    el.textContent = "";
  }
}

// ─── Pathogen form ─────────────────────────────────────────────────────────
function renderPathogenForm() {
  state.noRelMode = false;
  $("triples").innerHTML = "";
  addTripleRow();
  $("add-row").disabled = false;
  const btn = $("no-rel");
  btn.classList.remove("active");
  btn.textContent = "No relationships found";
}

// ─── Enzyme form ───────────────────────────────────────────────────────────
function renderEnzymeForm(a) {
  state.notCharMode = false;
  const pf = a.prefill || {};
  $("enzyme-doi").value = pf.doi ||
    (a.doi ? "doi:" + String(a.doi).replace(/^doi:/i, "") : "");
  $("enzymes").innerHTML = "";
  addEnzymeRow(pf);           // seed one row with any prefilled name/product
  $("add-enzyme").disabled = false;
  const btn = $("not-char");
  btn.classList.remove("active");
  btn.textContent = "Not a functional characterisation";
}

function addEnzymeRow(prefill) {
  prefill = prefill || {};
  const div = document.createElement("div");
  div.className = "enzyme-row";
  div.innerHTML = `
    <button class="remove-enzyme" title="remove enzyme" aria-label="remove enzyme">×</button>
    <div class="field">
      <label class="field-label">Enzyme name / accession</label>
      <input type="text" class="e-name" autocomplete="off" placeholder="e.g. AtTPS03 / Q9SF08">
    </div>
    <div class="field">
      <label class="field-label">Product (chemical the enzyme makes)</label>
      <input type="text" class="e-product" list="product-suggestions" autocomplete="off" placeholder="start typing — suggestions match existing entries">
    </div>
    <div class="field">
      <label class="field-label">Amino-acid sequence (paste from the paper / supplement)</label>
      <textarea class="e-sequence seq" rows="3" placeholder="MASV… (paste the protein sequence)"></textarea>
    </div>
  `;
  div.querySelector(".e-name").value = prefill.enzyme_name || prefill.name || "";
  div.querySelector(".e-product").value = prefill.product || "";
  div.querySelector(".remove-enzyme").addEventListener("click", () => {
    if ($("enzymes").children.length > 1) div.remove();
  });
  $("enzymes").appendChild(div);
}

function readEnzymes() {
  const rows = $("enzymes").querySelectorAll(".enzyme-row");
  const out = [];
  for (const row of rows) {
    const enzyme_name = row.querySelector(".e-name").value.trim();
    const product = row.querySelector(".e-product").value.trim();
    const sequence = row.querySelector(".e-sequence").value.replace(/\s+/g, "").trim();
    if (!enzyme_name && !product && !sequence) continue;   // empty row, skip
    out.push({ enzyme_name, product, sequence });
  }
  return out;
}

function toggleNotChar() {
  state.notCharMode = !state.notCharMode;
  const btn = $("not-char");
  if (state.notCharMode) {
    btn.classList.add("active");
    btn.textContent = "✓ Not a characterisation";
    $("enzymes").innerHTML = "";
    $("enzyme-doi").disabled = true;
    $("add-enzyme").disabled = true;
  } else {
    btn.classList.remove("active");
    btn.textContent = "Not a functional characterisation";
    $("enzyme-doi").disabled = false;
    $("add-enzyme").disabled = false;
    addEnzymeRow(state.current && state.current.prefill);
  }
}

// ─── Triple rows ───────────────────────────────────────────────────────────
function addTripleRow() {
  const div = document.createElement("div");
  div.className = "triple-row";
  div.innerHTML = `
    <input type="text" class="t-compound" placeholder="compound" autocomplete="off">
    <input type="text" class="t-pathogen" placeholder="pathogen" autocomplete="off">
    <select class="t-direction">
      ${CONFIG.DIRECTIONS.map(d => `<option value="${d.value}">${d.label}</option>`).join("")}
    </select>
    <button class="remove" title="remove row" aria-label="remove row">×</button>
  `;
  div.querySelector(".remove").addEventListener("click", () => {
    if ($("triples").children.length > 1) div.remove();
  });
  $("triples").appendChild(div);
}

function readTriples() {
  const rows = $("triples").querySelectorAll(".triple-row");
  const triples = [];
  for (const row of rows) {
    const compound = row.querySelector(".t-compound").value.trim();
    const pathogen = row.querySelector(".t-pathogen").value.trim();
    const direction = row.querySelector(".t-direction").value;
    if (!compound && !pathogen && !direction) continue; // empty row, skip silently
    triples.push({ compound, pathogen, direction });
  }
  return triples;
}

// ─── Controls ──────────────────────────────────────────────────────────────
function bindControls() {
  $("add-row").addEventListener("click", () => addTripleRow());
  $("no-rel").addEventListener("click", toggleNoRel);
  $("add-enzyme").addEventListener("click", () => addEnzymeRow(null));
  $("not-char").addEventListener("click", toggleNotChar);
  $("submit").addEventListener("click", submit);
}

function toggleNoRel() {
  state.noRelMode = !state.noRelMode;
  const btn = $("no-rel");
  if (state.noRelMode) {
    btn.classList.add("active");
    btn.textContent = "✓ No relationships";
    // Hide / clear triples since they're irrelevant in no-rel mode
    $("triples").innerHTML = "";
    $("add-row").disabled = true;
  } else {
    btn.classList.remove("active");
    btn.textContent = "No relationships found";
    $("add-row").disabled = false;
    addTripleRow();
  }
}

// ─── Submission ────────────────────────────────────────────────────────────
async function submit() {
  if (!state.current) return;
  const payload = buildPayload();
  if (!payload) return;    // validation failed; status already set

  setStatus("Submitting…");
  $("submit").disabled = true;

  if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.startsWith("REPLACE_")) {
    // Dev mode: print payload to console and pretend to advance
    console.log("[dev mode] payload:", payload);
    setStatus("[dev mode] payload printed to console. Configure APPS_SCRIPT_URL to send to Sheet.", "ok");
    $("submit").disabled = false;
    // Mark locally so the next pick advances
    state.serverState[state.current.id] = (state.serverState[state.current.id] || []).concat([state.labeller]);
    showNextAbstract();
    return;
  }

  try {
    const r = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const result = await r.json();
    if (result.status !== "ok") throw new Error(result.error || "unknown");

    setStatus("Submitted ✓", "ok");
    await refreshServerState();
    if (payload.task_type === "enzyme") fetchProducts();   // new products may now exist
    showNextAbstract();
    refreshLeaderboard();
  } catch (err) {
    setStatus("Submit failed: " + err.message, "error");
  } finally {
    $("submit").disabled = false;
  }
}

// Build the type-specific submission payload, or null (with a status message
// already set) if the current form fails validation.
function buildPayload() {
  const a = state.current;
  const type = itemType(a);
  const base = {
    k: state.k,
    labeller: state.labeller,
    task_type: type,
    abstract_id: a.id,
    abstract_title: a.title || "",
    abstract_text: a.abstract || "",
    notes: $("notes").value.trim(),
    submission_id: cryptoRandomId(),
    elapsed_seconds: Math.round((Date.now() - state.startTimeMs) / 1000),
    client_timestamp: new Date().toISOString(),
  };

  if (type === "enzyme") {
    const doi = $("enzyme-doi").value.trim();
    if (state.notCharMode) {
      return Object.assign(base, { not_characterization: true, doi, enzymes: [] });
    }
    const enzymes = readEnzymes();
    if (enzymes.length === 0) {
      setStatus("Add at least one enzyme, or click 'Not a functional characterisation'.", "error");
      return null;
    }
    for (const e of enzymes) {
      if (!e.enzyme_name || !e.product || !e.sequence) {
        setStatus("Each enzyme needs a name/accession, a product, and a pasted sequence.", "error");
        return null;
      }
    }
    return Object.assign(base, { not_characterization: false, doi, enzymes });
  }

  // Pathogen (default type)
  const triples = state.noRelMode ? [] : readTriples();
  if (!state.noRelMode) {
    if (triples.length === 0) {
      setStatus("Add at least one compound–pathogen pair, or click 'No relationships found'.", "error");
      return null;
    }
    for (const t of triples) {
      if (!t.compound || !t.pathogen || !t.direction) {
        setStatus("Each row needs a compound, a pathogen, and a direction. Use the 'No relationships' button if none apply.", "error");
        return null;
      }
    }
  }
  return Object.assign(base, { triples, no_relationships_found: state.noRelMode });
}

// ─── Leaderboard ───────────────────────────────────────────────────────────
async function refreshLeaderboard() {
  if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.startsWith("REPLACE_")) {
    return;  // dev mode — no server to ask
  }
  let rows;
  try {
    const url = `${CONFIG.APPS_SCRIPT_URL}?action=leaderboard&k=${encodeURIComponent(state.k)}`;
    const r = await fetch(url);
    if (!r.ok) return;
    rows = await r.json();
  } catch {
    return;
  }
  // Seed any missing roster names with 0 so everyone shows up.
  const counts = {};
  for (const n of CONFIG.ROSTER) counts[n] = 0;
  if (Array.isArray(rows)) {
    for (const r of rows) {
      if (r && typeof r.name === "string") counts[r.name] = r.count | 0;
    }
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  const tbody = document.querySelector("#leaderboard-table tbody");
  tbody.innerHTML = sorted.map(([name, count]) => {
    const cls = name === state.labeller ? "me" : "";
    return `<tr class="${cls}"><td>${name}</td><td class="count">${count}</td></tr>`;
  }).join("");
  $("leaderboard").classList.remove("hidden");
}

// ─── Helpers ───────────────────────────────────────────────────────────────
function setStatus(msg, cls) {
  const el = $("status");
  el.textContent = msg;
  el.className = "status " + (cls || "");
}

function cryptoRandomId() {
  // 16 bytes of entropy as a hex string
  const buf = new Uint8Array(16);
  crypto.getRandomValues(buf);
  return Array.from(buf).map(b => b.toString(16).padStart(2, "0")).join("");
}
