<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Decision Flow for Natural Scientists</title>
  <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" rel="stylesheet" />
  <style>
    :root {
      --bg: #f7f5f8;
      --card: #ffffff;
      --ink: #222222;
      --muted: #666666;
      --accent: #8a4680;
      --accent-light: #a95e9e;
      --accent-faint: #f3eaf1;
      --green: #2e7d5b;
      --green-bg: #e8f5ec;
      --amber: #b8860b;
      --amber-bg: #fdf5e0;
      --red: #b33a3a;
      --red-bg: #fbeaea;
      --line: #ddd4db;
      --max-width: 880px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Poppins", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.55;
    }

    .wrap {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(1.2rem, 2.4vw, 1.7rem);
      font-weight: 600;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      margin: 0 0 18px;
      font-weight: 300;
    }

    /* Dropdown selector */
    .selector-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .selector-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
    }

    .selector-dropdown {
      font-family: "Poppins", sans-serif;
      font-size: 0.9rem;
      padding: 8px 14px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      color: var(--ink);
      cursor: pointer;
      flex: 1;
      min-width: 240px;
      max-width: 500px;
    }

    .selector-dropdown:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(138, 70, 128, 0.15);
    }

    /* Diamond flow layout */
    .diamond {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Connector lines */
    .connector {
      width: 2px;
      height: 20px;
      background: var(--line);
      margin: 0 auto;
    }

    .connector-fork {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      position: relative;
      height: 24px;
    }

    .connector-fork::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 2px;
      height: 12px;
      background: var(--line);
    }

    .connector-fork::after {
      content: "";
      position: absolute;
      top: 12px;
      left: calc(25% - 4px);
      right: calc(25% - 4px);
      height: 2px;
      background: var(--line);
    }

    .connector-fork-down-left,
    .connector-fork-down-right {
      position: absolute;
      top: 12px;
      width: 2px;
      height: 12px;
      background: var(--line);
    }

    .connector-fork-down-left { left: calc(25% - 4px); }
    .connector-fork-down-right { right: calc(25% - 4px); }

    .connector-merge {
      display: flex;
      justify-content: center;
      width: 100%;
      position: relative;
      height: 24px;
    }

    .connector-merge::before {
      content: "";
      position: absolute;
      top: 12px;
      left: 50%;
      width: 2px;
      height: 12px;
      background: var(--line);
    }

    .connector-merge::after {
      content: "";
      position: absolute;
      top: 10px;
      left: calc(25% - 4px);
      right: calc(25% - 4px);
      height: 2px;
      background: var(--line);
    }

    .connector-merge-up-left,
    .connector-merge-up-right {
      position: absolute;
      top: 0;
      width: 2px;
      height: 12px;
      background: var(--line);
    }

    .connector-merge-up-left { left: calc(25% - 4px); }
    .connector-merge-up-right { right: calc(25% - 4px); }

    /* Split row */
    .split-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
    }

    /* Node cards */
    .node-card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 4px 16px rgba(60, 30, 55, 0.06);
      width: 100%;
      max-width: 600px;
      transition: border-color 0.3s;
    }

    .node-card.top-node,
    .node-card.bottom-node {
      max-width: 600px;
    }

    .node-card.border-green { border-color: var(--green); }
    .node-card.border-amber { border-color: var(--amber); }
    .node-card.border-red { border-color: var(--red); }

    .node-num {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .node-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .outcome {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 6px;
    }

    .outcome.green { background: var(--green-bg); color: var(--green); }
    .outcome.amber { background: var(--amber-bg); color: var(--amber); }
    .outcome.red { background: var(--red-bg); color: var(--red); }

    .node-body {
      font-size: 0.84rem;
      color: #333;
      line-height: 1.55;
    }

    .node-body p {
      margin: 0 0 8px;
    }

    .node-body p:last-child {
      margin-bottom: 0;
    }

    /* Subtask list */
    .subtask-list {
      list-style: none;
      padding: 0;
      margin: 8px 0 0;
    }

    .subtask-list li {
      padding: 6px 10px;
      margin: 3px 0;
      border-radius: 6px;
      font-size: 0.82rem;
      border-left: 3px solid var(--line);
      background: #fafafa;
    }

    .subtask-list li.good { border-left-color: var(--green); background: var(--green-bg); }
    .subtask-list li.caution { border-left-color: var(--amber); background: var(--amber-bg); }
    .subtask-list li.poor { border-left-color: var(--red); background: var(--red-bg); }

    /* Verdict */
    .verdict-box {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 2px solid var(--line);
      font-size: 0.84rem;
      line-height: 1.5;
    }

    .verdict-box.positive { border-color: var(--green); background: var(--green-bg); }
    .verdict-box.mixed { border-color: var(--amber); background: var(--amber-bg); }
    .verdict-box.negative { border-color: var(--red); background: var(--red-bg); }

    .verdict-label {
      font-weight: 600;
      font-size: 0.82rem;
      margin-bottom: 3px;
    }

    /* Placeholder state */
    .node-card.empty {
      border-style: dashed;
      opacity: 0.5;
    }

    .node-card.empty .node-body {
      color: var(--muted);
      font-style: italic;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .split-row {
        grid-template-columns: 1fr;
      }
      .connector-fork, .connector-merge {
        display: none;
      }
      .diamond {
        gap: 0;
      }
      .split-row {
        gap: 0;
      }
      .split-row .node-card {
        max-width: 100%;
      }
      /* Add simple connectors on mobile */
      .split-row .node-card + .node-card {
        margin-top: 8px;
      }
    }
  </style>
</head>

    <div class="diamond" id="diamond"></div>

    ]

  {

    nodes: [
      { label: "Node 1", heading: "Data Confidentiality Gate", outcome: "amber", outcomeText: "May involve sensitive descriptions", body: "<p>The application may describe sensitive populations, procedures, and data collection plans. Consider carefully what\u2019s shared.</p>" },

      { label: "Node 3", heading: "Task Decomposition", outcome: "amber", outcomeText: "Decomposes into 5 subtasks", body: "<p>A mix of boilerplate, custom content, and a capability barrier:</p>", subtasks: [ { text: "Draft standard boilerplate (data storage, consent withdrawal, risk mitigation)", rating: "good" }, { text: "Describe the specific study procedures", rating: "good" }, { text: "Draft consent forms", rating: "caution" }, { text: "Navigate the institutional IRB submission portal", rating: "poor" }, { text: "Ensure compliance with federal regulations", rating: "caution" } ] },

      { label: "Node 2", heading: "Exploratory vs. Considered", outcome: "amber", outcomeText: "Considered mode", body: "<p>Official document to a funder. Considered mode.</p>" },

// Build dropdown
const select = document.getElementById("exampleSelect");
for (const ex of EXAMPLES) {
  const opt = document.createElement("option");
  opt.value = ex.id;
  opt.textContent = `${ex.id}. ${ex.title} (${ex.role})`;
  select.appendChild(opt);
}

select.addEventListener("change", () => {
  const id = Number(select.value);
  if (id) render(EXAMPLES.find(e => e.id === id));
  else renderEmpty();
});

function esc(s) {
  const el = document.createElement("span");
  el.textContent = s;
  return el.innerHTML;
}

function buildNodeCard(n, extraClass) {
  let html = `<div class="node-card border-${n.outcome} ${extraClass || ""}">`;
  html += `<div class="node-num">${esc(n.label)}</div>`;
  html += `<div class="node-title">${esc(n.heading)}</div>`;
  html += `<span class="outcome ${n.outcome}">${esc(n.outcomeText)}</span>`;
  html += `<div class="node-body">${n.body}</div>`;
  if (n.subtasks) {
    html += '<ul class="subtask-list">';
    for (const st of n.subtasks) {
      html += `<li class="${st.rating}">${esc(st.text)}</li>`;
    }
    html += "</ul>";
  }
  // verdict is rendered separately below node 5
  html += "</div>";
  return html;
}

function buildVerdictCard(verdict) {
  if (!verdict) return "";
  return `<div class="verdict-box ${verdict.type}" style="max-width:600px;width:100%;"><div class="verdict-label">Verdict</div><div>${esc(verdict.text)}</div></div>`;
}

function buildEmptyCard(label, heading) {
  return `<div class="node-card empty"><div class="node-num">${esc(label)}</div><div class="node-title">${esc(heading)}</div><div class="node-body">Select an example task above to see this node\u2019s evaluation.</div></div>`;
}

function render(ex) {
  const d = document.getElementById("diamond");
  const n = ex.nodes; // [0]=node1, [1]=node2, [2]=node3, [3]=node4, [4]=node5

  let html = "";

  // Node 1: top center
  html += `<div style="width:100%;max-width:600px;">${buildNodeCard(n[0], "top-node")}</div>`;

  // Connector down
  html += '<div class="connector"></div>';

  // Node 2: center
  html += `<div style="width:100%;max-width:600px;">${buildNodeCard(n[1])}</div>`;

  // Fork connector
  html += '<div class="connector-fork"><div class="connector-fork-down-left"></div><div class="connector-fork-down-right"></div></div>';

  // Split row: left = exploratory label, right = nodes 3+4
  html += '<div class="split-row">';

  // Left: exploratory path — card + continuous line filling remaining space
  html += '<div style="display:flex;flex-direction:column;align-items:center;flex:1;">';
  html += '<div class="node-card" style="border-style:dashed;text-align:center;">';
  html += '<div class="node-num">Exploratory path</div>';
  html += '<div class="node-title">Lighter evaluation</div>';
  html += '<div class="node-body"><p>In exploratory mode, you might try things that are hard to validate or that AI isn\u2019t well suited for \u2014 because learning is the point.</p><p>The axes (nodes 3\u20134) can be applied less rigorously. But responsibility (node 5) still applies fully.</p></div>';
  html += '</div>';
  // Continuous line filling the gap down to the merge point
  html += '<div style="flex:1;width:2px;min-height:20px;background:var(--line);"></div>';
  html += '</div>';

  // Right: considered path (nodes 3 + 4)
  html += '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;">';
  html += buildNodeCard(n[2]);
  html += '<div class="connector" style="height:8px;"></div>';
  html += buildNodeCard(n[3]);
  html += '</div>';

  html += '</div>'; // end split-row

  // Merge connector
  html += '<div class="connector-merge"><div class="connector-merge-up-left"></div><div class="connector-merge-up-right"></div></div>';

  // Node 5: bottom center
  html += `<div style="width:100%;max-width:600px;">${buildNodeCard(n[4], "bottom-node")}</div>`;

  // Verdict below node 5
  const verdict = n[4].verdict;
  if (verdict) {
    html += '<div class="connector"></div>';
    html += buildVerdictCard(verdict);
  }

  d.innerHTML = html;
}

function renderEmpty() {
  const d = document.getElementById("diamond");
  let html = "";

  html += `<div style="width:100%;max-width:600px;">${buildEmptyCard("Node 1", "Data Confidentiality Gate")}</div>`;
  html += '<div class="connector"></div>';
  html += `<div style="width:100%;max-width:600px;">${buildEmptyCard("Node 2", "Exploratory vs. Considered")}</div>`;
  html += '<div class="connector-fork"><div class="connector-fork-down-left"></div><div class="connector-fork-down-right"></div></div>';
  html += '<div class="split-row">';
  html += '<div style="display:flex;flex-direction:column;align-items:center;flex:1;">';
  html += '<div class="node-card empty" style="border-style:dashed;text-align:center;"><div class="node-num">Exploratory path</div><div class="node-title">Lighter evaluation</div><div class="node-body">Select an example to see this path.</div></div>';
  html += '<div style="flex:1;width:2px;min-height:20px;background:var(--line);"></div>';
  html += '</div>';
  html += '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;">';
  html += buildEmptyCard("Node 3", "Task Decomposition");
  html += '<div class="connector" style="height:8px;"></div>';
  html += buildEmptyCard("Node 4", "Validateability + AI Capability Fit");
  html += '</div>';
  html += '</div>';
  html += '<div class="connector-merge"><div class="connector-merge-up-left"></div><div class="connector-merge-up-right"></div></div>';
  html += `<div style="width:100%;max-width:600px;">${buildEmptyCard("Node 5", "Responsibility")}</div>`;
  html += '<div class="connector"></div>';
  html += '<div class="verdict-box mixed" style="max-width:600px;width:100%;opacity:0.5;border-style:dashed;"><div class="verdict-label">Verdict</div><div>Select an example task to see the overall assessment.</div></div>';

  d.innerHTML = html;
}

// Initial empty state
renderEmpty();
</script>

</html>
